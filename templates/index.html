<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>NES Analytics Dashboard</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%234c44b0'/><text x='16' y='22' text-anchor='middle' font-size='18' fill='white' font-family='sans-serif' font-weight='bold'>N</text></svg>">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f4f2;--card:#fff;--line:#e6e4e1;--line2:#f0eeed;
  --t1:#111;--t2:#555;--t3:#999;
  --purple:#4c44b0;--green:#0b7a58;--red:#b83232;--amber:#a05208;
  --rc:#e24b4a;--pc:#ef9f27;--cc:#1d9e75;
}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  font-size:13px;color:var(--t1);background:var(--bg);overflow:hidden}
.shell{display:grid;grid-template-columns:220px 1fr;height:100vh}
/* SIDEBAR */
.sb{border-right:1px solid var(--line);background:var(--card);display:flex;flex-direction:column;overflow:hidden}
.sb-top{padding:16px 16px 12px;border-bottom:1px solid var(--line2);flex-shrink:0}
.sb-logo{font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--t3);margin-bottom:2px}
.sb-title{font-size:13px;font-weight:700}
.sb-sub{font-size:10px;color:var(--t3);margin-top:1px}
.sb-nav{flex:1;overflow-y:auto;padding:10px 8px}
.sb-label{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.6px;padding:8px 8px 3px}
.sb-btn{display:flex;align-items:center;gap:8px;width:100%;padding:7px 9px;border:none;
  background:none;cursor:pointer;border-radius:6px;color:var(--t2);font-size:12px;
  text-align:left;transition:background .1s,color .1s}
.sb-btn:hover{background:var(--bg);color:var(--t1)}
.sb-btn.on{background:var(--purple);color:#fff}
.sb-btn .dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.sb-btn .lbl{flex:1;line-height:1.4}
.sb-btn .sdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.sb-div{height:1px;background:var(--line2);margin:6px 8px}
.fetch-btn{display:flex;align-items:center;justify-content:center;gap:5px;
  width:calc(100% - 16px);margin:3px 8px 6px;padding:5px 8px;font-size:11px;
  border:1px dashed var(--line);border-radius:6px;background:none;
  cursor:pointer;color:var(--t3);transition:all .15s}
.fetch-btn:hover{border-color:var(--purple);color:var(--purple)}
.fetch-btn.loading{border-color:var(--amber);color:var(--amber)}
.fetch-btn.ready{border-color:var(--green);color:var(--green)}
/* MAIN */
.main{display:flex;flex-direction:column;overflow:hidden;height:100vh}
.top-bar{padding:14px 24px 0;flex-shrink:0}
.bc{font-size:11px;color:var(--t3);margin-bottom:10px;display:flex;gap:5px}
.bc a{color:var(--t2);cursor:pointer}.bc a:hover{text-decoration:underline}
.page-hdr{display:flex;justify-content:space-between;align-items:flex-start}
.page-title{font-size:16px;font-weight:700;display:flex;align-items:center;gap:8px;margin-bottom:3px}
.page-sub{font-size:11px;color:var(--t3)}
.page-meta{font-size:10px;color:var(--t3);text-align:right;line-height:1.7}
/* TABS */
.tab-bar{display:flex;border-bottom:1px solid var(--line);padding:0 24px;flex-shrink:0;margin-top:12px}
.tab-btn{padding:8px 14px;font-size:12px;border:none;background:none;cursor:pointer;
  color:var(--t3);border-bottom:2px solid transparent;margin-bottom:-1px;font-weight:400;white-space:nowrap}
.tab-btn:hover{color:var(--t1)}
.tab-btn.on{color:var(--purple);border-bottom-color:var(--purple);font-weight:600}
/* KPI */
.kpi-row{display:flex;gap:10px;padding:12px 24px;flex-shrink:0}
.kpi{background:var(--card);border:1px solid var(--line);border-radius:7px;padding:10px 14px;flex:1}
.kpi-l{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.kpi-v{font-size:20px;font-weight:700;letter-spacing:-.5px;line-height:1}
.kpi-s{font-size:10px;color:var(--t2);margin-top:3px}
/* TABLE AREA */
.content{flex:1;overflow:hidden;display:flex;flex-direction:column;padding:0 24px 14px}
.toolbar{display:flex;gap:7px;align-items:center;margin-bottom:8px;flex-shrink:0;flex-wrap:wrap}
.toolbar input,.toolbar select{font-size:12px;padding:5px 9px;border:1px solid var(--line);
  border-radius:6px;background:var(--card);color:var(--t1);height:29px}
.toolbar input{width:190px}
.fc{font-size:11px;color:var(--t3);margin-left:auto}
.tbl-wrap{flex:1;overflow:auto;border:1px solid var(--line);border-radius:8px}
table{width:100%;border-collapse:collapse;font-size:12px}
thead th{position:sticky;top:0;z-index:2;background:#fafaf8;text-align:left;
  padding:7px 10px;font-size:10px;font-weight:600;color:var(--t3);
  text-transform:uppercase;letter-spacing:.4px;border-bottom:1px solid var(--line);white-space:nowrap}
tbody td{padding:6px 10px;border-bottom:1px solid var(--line2);vertical-align:middle}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover td{background:#fafaf9;cursor:pointer}
tbody tr.sel td{background:#eeedfb}
/* MONTHLY TABLE */
table.t-mo{min-width:max-content}
/* Monthly table — double header rows */
table.t-mo thead tr:nth-child(1) th{position:sticky;top:0;z-index:3;background:#fafaf8;white-space:nowrap}
table.t-mo thead tr:nth-child(2) th{position:sticky;top:26px;z-index:3;background:#f3f2f0;white-space:nowrap;border-bottom:2px solid var(--line)}
/* Triple-header (sub-pillar grouping) */
table.t-mo.t-pillar thead tr:nth-child(1) th{position:sticky;top:0;z-index:3;background:#fafaf8;white-space:nowrap}
table.t-mo.t-pillar thead tr:nth-child(2) th{position:sticky;top:26px;z-index:3;background:#f3f2f0;white-space:nowrap;border-bottom:none}
table.t-mo.t-pillar thead tr:nth-child(3) th{position:sticky;top:52px;z-index:3;background:#ece9e4;white-space:nowrap;border-bottom:2px solid var(--line)}
table.t-mo thead th.f-ref{text-align:left;position:sticky;left:0;z-index:5;background:#fafaf8;min-width:90px;max-width:90px}
table.t-mo thead th.f-nm {text-align:left;position:sticky;left:90px;z-index:5;background:#fafaf8;min-width:150px;max-width:150px}
table.t-mo thead th.f-st {text-align:left;position:sticky;left:240px;z-index:5;background:#fafaf8;min-width:90px;max-width:90px;border-right:2px solid var(--line)}
table.t-mo tbody td{text-align:center;padding:5px 6px;white-space:nowrap}
table.t-mo tbody td.f-ref{text-align:left;position:sticky;left:0;z-index:1;background:var(--card);font-size:10px;color:var(--t3);min-width:90px;max-width:90px}
table.t-mo tbody td.f-nm {text-align:left;position:sticky;left:90px;z-index:1;background:var(--card);min-width:150px;max-width:150px}
table.t-mo tbody td.f-st {text-align:left;position:sticky;left:240px;z-index:1;background:var(--card);color:var(--t2);min-width:90px;max-width:90px;border-right:2px solid var(--line2)}
table.t-mo tbody tr:hover td{background:#fafaf9}
table.t-mo tbody tr:hover td.f-ref,table.t-mo tbody tr:hover td.f-nm,table.t-mo tbody tr:hover td.f-st{background:#fafaf9}
table.t-mo tbody tr.sel td{background:#eeedfb}
table.t-mo tbody tr.sel td.f-ref,table.t-mo tbody tr.sel td.f-nm,table.t-mo tbody tr.sel td.f-st{background:#eeedfb}
table.t-mo tfoot td{position:sticky;bottom:0;z-index:2;padding:5px 6px;font-weight:700;font-size:11px;border-top:2px solid var(--line);background:#fafaf8;text-align:center;white-space:nowrap}
table.t-mo tfoot td.f-ref{position:sticky;left:0;z-index:3;background:#fafaf8;text-align:left}
table.t-mo tfoot td.f-nm {position:sticky;left:90px;z-index:3;background:#fafaf8}
table.t-mo tfoot td.f-st {position:sticky;left:240px;z-index:3;background:#fafaf8;border-right:2px solid var(--line)}
.h0{color:var(--line2)}.h1{background:#eaf6f1;color:#0d6e50}
.h2{background:#c0e9d8;color:#0a5540;font-weight:600}.h3{background:#6fcfae;color:#04362a;font-weight:700}
.h4{background:#219a6e;color:#fff;font-weight:700}
/* PILLS */
.pill{display:inline-flex;align-items:center;font-size:10px;padding:2px 8px;border-radius:10px;font-weight:500;white-space:nowrap}
.p-g{background:#e2f5ee;color:#0b7a58}.p-r{background:#fde8e8;color:#b83232}
.p-y{background:#fdf4e3;color:#a05208}
.cat-4u{background:#ebe9fd;color:var(--purple);font-size:9px;font-weight:700;padding:2px 7px;border-radius:8px;text-transform:uppercase;letter-spacing:.4px;display:inline-block}
.cat-2u{background:#e0f2ee;color:var(--green);font-size:9px;font-weight:700;padding:2px 7px;border-radius:8px;text-transform:uppercase;letter-spacing:.4px;display:inline-block}
.chip{font-size:9px;padding:1px 6px;border-radius:8px;background:var(--bg);color:var(--t2);border:1px solid var(--line)}
.pdots{display:flex;gap:3px;align-items:center}
.pdot{width:7px;height:7px;border-radius:50%}
/* WEEK CHART */
.bars-wrap{display:flex;gap:2px;align-items:flex-end;height:70px;overflow-x:auto;flex-shrink:0}
.bar-col{display:flex;flex-direction:column;align-items:center;cursor:pointer;flex-shrink:0;min-width:22px}
.bar-col:hover .bar-stk{opacity:.75}
.bar-col.sel .bar-stk{outline:2px solid var(--purple);outline-offset:2px;border-radius:2px}
.bar-stk{width:18px;display:flex;flex-direction:column;border-radius:2px 2px 0 0;overflow:hidden}
.bar-seg{width:100%}
.bar-lbl{font-size:8px;color:var(--t3);margin-top:3px;text-align:center;white-space:normal;line-height:1.2}
.bar-lbl.on{color:var(--purple);font-weight:700}
.ld{display:flex;align-items:center;gap:4px}
.ld-dot{width:10px;height:10px;border-radius:2px}
/* SPLIT */
.split{display:flex;gap:12px;flex:1;overflow:hidden}
.split-l{flex:1;overflow:hidden;display:flex;flex-direction:column}
.split-r{width:370px;flex-shrink:0;border:1px solid var(--line);border-radius:8px;background:var(--card);display:flex;flex-direction:column;overflow:hidden;display:none}
.split-r.open{display:flex}
.ph{padding:12px 14px;border-bottom:1px solid var(--line);flex-shrink:0;display:flex;justify-content:space-between;align-items:flex-start}
.ph h4{font-size:13px;font-weight:700;line-height:1.3}
.ph .pref{font-size:10px;color:var(--t3);margin-top:2px}
.pclose{font-size:18px;cursor:pointer;color:var(--t3);line-height:1;flex-shrink:0}
.pclose:hover{color:var(--t1)}
.pbody{flex:1;overflow-y:auto;padding:12px 14px}
/* SLIDE PANEL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.18);z-index:100;display:none}
.overlay.open{display:block}
.panel{position:fixed;right:0;top:0;bottom:0;width:440px;background:var(--card);
  border-left:1px solid var(--line);z-index:101;display:flex;flex-direction:column;
  transform:translateX(100%);transition:transform .2s ease}
.panel.open{transform:translateX(0)}
.ptabs{display:flex;border-bottom:1px solid var(--line);flex-shrink:0}
.ptab{padding:7px 14px;font-size:11px;border:none;background:none;cursor:pointer;
  color:var(--t3);border-bottom:2px solid transparent;margin-bottom:-1px}
.ptab:hover{color:var(--t1)}
.ptab.on{color:var(--purple);border-bottom-color:var(--purple);font-weight:600}
/* panel rows */
.psub-hdr{display:flex;align-items:center;gap:7px;margin-bottom:9px;padding-bottom:6px;border-bottom:1px solid var(--line2)}
.psub-mod{font-size:12px;font-weight:600}.psub-ev{font-size:11px;color:var(--t3);margin-left:auto}
.prow{display:flex;align-items:center;gap:7px;padding:5px 0;border-bottom:1px solid var(--line2)}
.prow:last-child{border-bottom:none}
.pdot2{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.pname{flex:1;font-size:11px}.pev{font-size:11px;font-weight:600;min-width:28px;text-align:right}
.ppax{font-size:10px;color:var(--t3);min-width:38px;text-align:right}
.pmiss{font-size:10px;color:#b83232;font-style:italic}
.put{background:#fde8e8;border-radius:6px;padding:9px 12px;margin-bottom:10px}
.put-t{font-size:11px;font-weight:600;color:#b83232;margin-bottom:3px}
.put-s{font-size:11px;color:var(--t2);line-height:1.5}
.spark{display:flex;align-items:flex-end;gap:2px;height:28px}
/* event rows */
.ev-sec-hdr{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;padding-bottom:4px;border-bottom:1px solid var(--line2)}
.ev-row{padding:7px 0;border-bottom:1px solid var(--line2)}
.ev-row:last-child{border-bottom:none}
.ev-prog{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px}
.ev-name{font-size:11px;font-weight:500;line-height:1.4;margin-bottom:4px}
.ev-meta{display:flex;gap:8px;font-size:10px;color:var(--t3);align-items:center;flex-wrap:wrap}
.sso-tag{font-size:9px;padding:1px 7px;border-radius:8px;background:#f0eef8;color:var(--purple);font-weight:600;letter-spacing:.2px;white-space:nowrap}
.att-ok{color:var(--green);font-weight:600}.att-z{color:var(--red);font-weight:600}.att-p{color:var(--amber);font-weight:600}
.ut-banner{background:#fef2f2;border:1px solid #f5c6c6;border-radius:7px;padding:10px 14px;margin-bottom:10px}
.ut-banner-t{font-size:12px;font-weight:700;color:var(--red);margin-bottom:3px}
.ut-banner-s{font-size:11px;color:var(--t2)}
/* ov grid */
.ov-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;overflow-y:auto;flex:1}
.ov-card{background:var(--card);border:1px solid var(--line);border-radius:8px;padding:14px;cursor:pointer;transition:border-color .15s}
.ov-card:hover{border-color:var(--purple)}
.ov-bar{height:3px;background:var(--line2);border-radius:2px;margin:9px 0 4px}
.ov-fill{height:3px;border-radius:2px}
/* state box */
.state-box{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:12px;color:var(--t3)}
.state-box .icon{font-size:32px}
/* date range + program filter */
.sb-filter{padding:8px 12px 6px;border-top:1px solid var(--line2);flex-shrink:0}
.sb-filter label{font-size:9px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:4px}
.sb-filter input[type=date]{font-size:11px;padding:4px 6px;border:1px solid var(--line);border-radius:5px;background:var(--card);color:var(--t1);width:100%;margin-bottom:4px;box-sizing:border-box}
.sb-filter input[type=date]:focus{outline:none;border-color:var(--purple)}
.filter-apply{margin-top:8px;width:100%;padding:6px;font-size:11px;font-weight:700;background:var(--purple);color:#fff;border:none;border-radius:6px;cursor:pointer;letter-spacing:.2px}
.filter-apply:hover{opacity:.88}
.filter-clr{margin-top:4px;width:100%;padding:4px;font-size:10px;background:none;border:1px solid var(--line);border-radius:6px;cursor:pointer;color:var(--t3)}
.filter-clr:hover{border-color:var(--t2);color:var(--t1)}
/* MOBILE */
.sb-toggle{display:none;position:fixed;top:10px;left:10px;z-index:200;width:38px;height:38px;border:1px solid var(--line);border-radius:8px;background:var(--card);cursor:pointer;align-items:center;justify-content:center;font-size:18px;color:var(--t1);box-shadow:0 1px 4px rgba(0,0,0,.08)}
.sb-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.32);z-index:149}
.sb-backdrop.open{display:block}
@media(max-width:768px){
  html,body{height:auto;overflow-y:auto}
  .shell{grid-template-columns:1fr;height:auto;min-height:100vh}
  .sb{position:fixed;left:0;top:0;height:100vh;width:260px;z-index:150;transform:translateX(-100%);transition:transform .22s ease}
  .sb.open{transform:translateX(0)}
  .sb-toggle{display:flex}
  .main{height:auto;overflow:visible;padding-top:56px}
  .top-bar{padding:10px 14px 0}
  .kpi-row{padding:10px 14px;flex-wrap:wrap}
  .kpi{min-width:calc(50% - 5px)}
  .tab-bar{padding:0 14px;overflow-x:auto;-webkit-overflow-scrolling:touch}
  .content{padding:0 14px 14px;overflow:visible;flex:none}
  .tbl-wrap{max-height:60vh;overflow:auto}
  .toolbar input{width:130px}
  .page-hdr{flex-direction:column;gap:4px}
  .page-meta{text-align:left}
  .panel{width:100vw}
  .split{flex-direction:column}
  .split-r{width:100%;display:none}
  .split-r.open{display:flex;max-height:50vh}
  .ov-grid{grid-template-columns:repeat(2,1fr)}
  .fc{margin-left:0}
  table.t-mo thead th.f-ref,table.t-mo tbody td.f-ref,table.t-mo tfoot td.f-ref{min-width:75px;max-width:75px}
  table.t-mo thead th.f-nm,table.t-mo tbody td.f-nm,table.t-mo tfoot td.f-nm{min-width:120px;max-width:120px;left:75px}
  table.t-mo thead th.f-st,table.t-mo tbody td.f-st,table.t-mo tfoot td.f-st{min-width:65px;max-width:65px;left:195px}
  .toolbar select{font-size:11px;padding:4px 6px}
}
@media(max-width:480px){
  .ov-grid{grid-template-columns:1fr}
  .tab-btn{padding:8px 10px;font-size:11px}
  .toolbar input{width:110px}
  .top-bar{padding:8px 12px 0}
  .content{padding:0 12px 12px}
}
.sb-filter select{font-size:11px;padding:4px 6px;border:1px solid var(--line);border-radius:5px;background:var(--card);color:var(--t1);width:100%;margin-bottom:4px;box-sizing:border-box;height:26px}
.sb-filter select.gf-on{border-color:var(--purple);background:#f5f4ff;color:var(--purple)}
.q-tabs{display:flex;gap:4px;padding:0 24px 8px;flex-shrink:0;flex-wrap:wrap}
.q-tab{padding:4px 12px;font-size:11px;border:1px solid var(--line);border-radius:14px;background:none;cursor:pointer;color:var(--t2)}
.q-tab:hover{border-color:var(--purple);color:var(--purple)}
.q-tab.on{background:var(--purple);border-color:var(--purple);color:#fff;font-weight:600}
.ut-row>td{background:#fff4f4!important}
.ut-row:hover>td{background:#ffecec!important}
.dl-btn{display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:4px 10px;border:1px solid var(--line);border-radius:6px;background:var(--card);cursor:pointer;color:var(--t2);height:29px;white-space:nowrap;flex-shrink:0}
.dl-btn:hover{border-color:var(--green);color:var(--green)}
.kpi[title]{cursor:help}
.kpi[title]:hover{border-color:var(--purple)}
</style>
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
</head>
<body>
<button class="sb-toggle" id="sbToggle" onclick="toggleSb()">&#9776;</button>
<div class="sb-backdrop" id="sbBd" onclick="closeSb()"></div>
<div class="shell">
<aside class="sb">
  <div class="sb-top">
    <div class="sb-logo">NES Analytics</div>
    <div class="sb-title">Dashboard</div>
    <div class="sb-sub" id="sb-upd">Connecting…</div>
  </div>
  <div class="sb-filter">
    <label>Date range</label>
    <input type="date" id="drS" value="2026-01-01" oninput="_sd=this.value" title="Start date">
    <input type="date" id="drE" oninput="_ed=this.value" title="End date">
    <label style="margin-top:5px">Tech Partner (TP)</label>
    <select id="gtp" onchange="applyGlobalFilter()"><option value="">All TP</option></select>
    <label>DUSP</label>
    <select id="gdusp" onchange="applyGlobalFilter()"><option value="">All DUSP</option></select>
    <label>Phase</label>
    <select id="gphase" onchange="applyGlobalFilter()"><option value="">All phases</option></select>
    <label style="margin-top:5px">State</label>
    <select id="gstate" onchange="applyGlobalFilter()"><option value="">All states</option></select>
    <label>Program / Sub-pillar</label>
    <select id="gprog" onchange="applyGlobalFilter()"><option value="">All programs</option></select>
    <button class="filter-apply" onclick="applyFilter()">Fetch with filter</button>
    <button class="filter-clr" onclick="clearFilter()">Clear all</button>
  </div>
  <div class="sb-nav">
    <div class="sb-label">View</div>
    <button class="sb-btn on" id="navOv" onclick="gOv(this)">
      <div class="dot" style="background:var(--purple)"></div><span class="lbl">Overview</span>
    </button>
    <div class="sb-div"></div>
    <div class="sb-label">NADI4U</div><div id="nav4u"></div>

// Fetches all uncached subcategories one-by-one in background (sequential

async function applyFilter(){
  const upd=document.getElementById('sb-upd');
  upd.textContent='Clearing cache…';

  const all=Object.values(SUBS).sort((a,b)=>a.id-b.id);
  const total=all.length;
  let done=0;
  upd.textContent=`Fetching 0/${total} subcategories…`;
  for(const s of all){
    await fetchOne(s.id, done, total);
    done++;
    upd.textContent=`Fetched ${done}/${total} subcategories…`;
  }
  upd.textContent='Done · '+new Date().toLocaleDateString('en-MY');
  // After all fetches complete, if user is on a sub that's now cached, reload it.
  // Otherwise, refresh the overview so cards show as cached.
  if(curSub && SUBS[curSub] && SUBS[curSub].cached){
    loadSubData(curSub);
  } else {
    gOv(document.getElementById('navOv'));

}

function fetchOne(id, queueDone, queueTotal){
  return new Promise(async resolve=>{
    const fb=document.getElementById('fb_'+id);
    if(fb){fb.className='fetch-btn loading';fb.textContent='⏳ queued…';}
    // Trigger server-side fetch (read dates fresh from DOM each call)
    const _sd2=(document.getElementById('drS')||{}).value||'';
    const _ed2=(document.getElementById('drE')||{}).value||'';
    const _body={};if(_sd2)_body.start_date=_sd2;if(_ed2)_body.end_date=_ed2;
    const res=await fetch('/api/fetch/'+id,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(_body)});
    if(!res.ok){if(fb){fb.textContent='⚠ start failed';fb.className='fetch-btn';}resolve();return;}
    // Poll until done
    const iv=setInterval(async()=>{
      const r=await fetch('/api/progress/'+id).then(x=>x.json());
      const chunkBit=(r.chunks&&r.done_chunks)?` ${r.done_chunks}/${r.chunks} ch`:'';
      const label=r.status==='running'?`⏳ ${r.pct}%${chunkBit}`
                 :r.status==='done'?'✓ cached'
                 :r.status==='error'?`⚠ error`:'…';
      if(fb){fb.textContent=label;}
      document.getElementById('sb-upd').textContent=
        `[${queueDone+1}/${queueTotal}] ${r.mod||'sub'+id} — ${r.msg||''}`;
      if(r.status==='done'){
        clearInterval(iv);
        if(fb){fb.className='fetch-btn ready';}
        const sd=document.getElementById('sd_'+id);
        if(sd) sd.style.background='var(--green)';
        SUBS[id].cached=true;
        SUBS[id].fetched=new Date().toISOString().slice(0,10);
        if(curSub===id) loadSubData(id);
        resolve();
      } else if(r.status==='error'){
        clearInterval(iv);
        if(fb){fb.className='fetch-btn';fb.textContent='⚠ retry';}
        resolve();  // move to next even on error
      }
    },1500);
  });
}

// Canonical LL sub-program classifier — priority matches pivot_shared._ll_classifier (last-wins = skill highest)
function _llPillar(pn){const p=(pn||'').toLowerCase();if(p.includes('skillforge')||p.includes('skill'))return'ESPORT';if(p.includes('cyber')||p.includes('siber')||p.includes('security'))return'CYBERSECURITY';if(p.includes('ekelas')||p.includes('e-kelas'))return'EKELAS';if(p.includes('tuisyen')||p.includes('tuition')||p.includes('guidance'))return'TUISYEN RAKYAT';if(p.includes('mahir'))return'MAHIR';if(p.includes('esport'))return'ESPORT';if(p.includes('tiny')||p.includes('techie'))return'TINYTECHIES';return'CYBERSECURITY';}

function normalizeSubData(raw,id){
  if(!Array.isArray(raw.nadi))return raw; // already dict format
  const s=SUBS[id]||{};
  const refToIdx={};NI.forEach((n,i)=>{refToIdx[n[0]]=i;});

  // For Lifelong Learning, collapse raw program_name values using global _llPillar
  if(id===2){
    raw.nadi.forEach(n=>{
      if(!n.programs||!Object.keys(n.programs).length)return;
      const rem={};
      Object.entries(n.programs).forEach(([pn,d])=>{const t=_llPillar(pn);if(!rem[t])rem[t]={events:0,pax:0};rem[t].events+=(d.events||0);rem[t].pax+=(d.pax||0);});
      n.programs=rem;
    });
  }

  /* ── NADI INDEX ── */
  const progSet=new Set();
  raw.nadi.forEach(n=>Object.keys(n.programs||{}).forEach(p=>progSet.add(p)));
  const progs=[...progSet].sort();
  let totE=0,totP=0,active=0;
  const nadiRows=[];
  raw.nadi.forEach(n=>{
    const idx=refToIdx[n.refid];if(idx===undefined)return;
    const ne=n.events||0,np=(n.pax||{}).total||0;
    totE+=ne;totP+=np;if(ne>0)active++;
    const pr={};
    progs.forEach((pn,k)=>{const pg=(n.programs||{})[pn];if(pg&&(pg.events||pg.pax))pr[String(k)]=[pg.events||0,pg.pax||0];});
    nadiRows.push([idx,ne,np,pr]);
  });
  const _evByNI={};raw.nadi.forEach(n=>{const idx=refToIdx[n.refid];if(idx!==undefined&&n.ev&&n.ev.length)_evByNI[idx]=n.ev;});
  const nadiDict={cat:s.cat||'',mod:s.mod||'',e:totE,p:totP,a:active,u:NI.length-active,progs,rows:nadiRows,ev:_evByNI};

  /* ── MONTHLY ── */
  const months=raw.monthly.map(m=>m.label);
  const nm=months.length;
  const mMap={};
  raw.monthly.forEach((m,mi)=>{
    Object.entries(m.nadi||{}).forEach(([ref,data])=>{
      const idx=refToIdx[ref];if(idx===undefined)return;
      if(!mMap[idx])mMap[idx]={tot:new Array(nm).fill(0),pax:new Array(nm).fill(0),pr:{}};
      mMap[idx].tot[mi]=data.events||0;mMap[idx].pax[mi]=data.pax||0;
      // sub_id=2: backend now emits actual per-program monthly data (canonical names)
      if(id===2&&data.pr){
        progs.forEach((pn,k)=>{
          const pg=data.pr[pn];if(!pg)return;
          if(!mMap[idx].pr[String(k)])mMap[idx].pr[String(k)]={ev:new Array(nm).fill(0),px:new Array(nm).fill(0)};
          mMap[idx].pr[String(k)].ev[mi]=pg.events||0;
          mMap[idx].pr[String(k)].px[mi]=pg.pax||0;
        });
      }
    });
  });
  // For non-LL subcategories: distribute per-program totals proportionally across months
  if(id!==2){
    raw.nadi.forEach(n=>{
      const idx=refToIdx[n.refid];if(idx===undefined||!mMap[idx])return;
      const v=mMap[idx],monthSum=v.tot.reduce((s,x)=>s+x,0);if(!monthSum)return;
      progs.forEach((pn,k)=>{
        const pg=(n.programs||{})[pn];if(!pg||!(pg.events||pg.pax))return;
        let remEv=pg.events||0,remPx=pg.pax||0;const ev=[],px=[];
        for(let i=0;i<nm;i++){
          if(i===nm-1){ev.push(Math.max(0,remEv));px.push(Math.max(0,remPx));}
          else{const frac=v.tot[i]/monthSum;const te=Math.round((pg.events||0)*frac),tp=Math.round((pg.pax||0)*frac);ev.push(te);px.push(tp);remEv-=te;remPx-=tp;}
        }
        v.pr[String(k)]={ev,px};
      });
    });
  }
  const monthlyRows=Object.entries(mMap).map(([idx,v])=>[+idx,v.tot,v.pax,v.pr]);
  const monthlyDict={months,progs,rows:monthlyRows};

  /* ── WEEKLY ── */
  function isoWeekStart(ws){
    const m=/^(\d{4})-W(\d{2})$/.exec(ws);if(!m)return null;
    const yr=+m[1],wk=+m[2];const jan4=new Date(yr,0,4);
    const dow=jan4.getDay()||7;
    return new Date(jan4.getTime()-(dow-1)*86400000+(wk-1)*7*86400000);
  }
  const wkWeeks=raw.weekly.map(w=>{const ws=isoWeekStart(w.period);return{k:w.period,l:w.label,ws:ws?ws.toISOString().slice(0,10):'',ev:w.events||0,z:0,p:0,c:w.events||0};});
  const nw={};const activeSet=new Set();
  raw.weekly.forEach(w=>{
    const wk=w.period;nw[wk]={};
    Object.entries(w.nadi||{}).forEach(([ref,data])=>{
      const evCnt=data.events||0;if(!evCnt)return;
      const paxTot=data.pax||0,base=Math.floor(paxTot/evCnt),rem=paxTot-base*evCnt;
      const evs=[];for(let i=0;i<evCnt;i++){const a=base+(i<rem?1:0);evs.push({pn:'',pr:'',tp:a,at:a,st:'c',sso:''});}
      nw[wk][ref]=evs;activeSet.add(ref);
    });
  });
  const weeklyDict={cat:s.cat||'',mod:s.mod||'',weeks:wkWeeks,nw,zero:[],active_refs:[...activeSet]};

  return{...raw,nadi:nadiDict,monthly:monthlyDict,weekly:weeklyDict};
}

async function loadSubData(id){
  document.getElementById('main').innerHTML=`<div class="state-box"><div class="icon">⏳</div><p>Loading data…</p></div>`;

    if(!r.ok){document.getElementById('main').innerHTML=`<div class="state-box"><div class="icon">⚠️</div><p>${r.error||'Data not available'}</p><p style="font-size:11px;color:var(--t3)">Try fetching again from the sidebar.</p></div>`;return;}
    window._D=normalizeSubData(r.data,id);
    buildShell(id);showTab('nadi');
  }catch(e){
    console.error('loadSubData error:',e);
    document.getElementById('main').innerHTML=`<div class="state-box"><div class="icon">⚠️</div><p>Load failed: ${e.message}</p><button onclick="loadSubData(${id})" style="margin-top:8px;padding:4px 12px;cursor:pointer">Retry</button></div>`;
  }
}

function buildShell(id){

  const _thresh=3*Math.max(1,_qtrs.size);

  const _tRowsBase=NI.map((n,i)=>{

    const te=a?a.e:0,tp=a?a.p:0,pr=a?a.pr:{};
    const ap=Object.keys(pr).length;
    return{i,ref,nm,state,stp,sdusp,sphase,te,tp,pr,ap,tp2:_npl,st:te<_thresh?'u':ap<_npl?'p':'a'};
  });

  tRowsAll=(_globalTP||_globalDUSP||_globalPhase||_globalState)?_tRowsBase.filter(r=>{
    if(_globalTP&&r.stp!==_globalTP)return false;

    if(_globalPhase&&r.sphase!==_globalPhase)return false;
    if(_globalState&&r.state!==_globalState)return false;
    return true;
  }):[..._tRowsBase];
  const _nxr=(f=>{const m=/(\d+)\s+(\w+)\s+(\d+),\s+(\d+):(\d+)/.exec(f||'');if(!m)return'—';const D=new Date(+m[3],{Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11}[m[2]]||0,+m[1],+m[4]+1,+m[5]);return D.getDate()+' '+['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][D.getMonth()]+' '+D.getFullYear()+', '+String(D.getHours()).padStart(2,'0')+':'+String(D.getMinutes()).padStart(2,'0');})(d.fetched);
  document.getElementById('main').innerHTML=`
    <div class="top-bar">
      <div class="bc">NES &rsaquo; <a onclick="gOv(document.getElementById('navOv'))">Overview</a> &rsaquo; ${nd.cat} &rsaquo; <span>${ce(lbl)}</span></div>

      </div>
    </div>
    <div class="tab-bar">
      <button class="tab-btn on" id="tN" onclick="showTab('nadi')">NADI Index</button>

}

function showTab(t){
  ['tN','tM','tQ','tW'].forEach((id,i)=>{const el=document.getElementById(id);if(el)el.className='tab-btn'+(['nadi','monthly','quarterly','weekly'][i]===t?' on':'');});
  const d=window._D;if(!d)return;
  curTab=t;
  if(t!=='weekly'){selWeek=null;selMonth=null;}
  if(t==='nadi')renderNadi(d);
  else if(t==='monthly')renderMonthly(d);
  else if(t==='quarterly')renderQuarterly(d);
  else renderWeekly(d);
}

/* ── NADI INDEX ── */

function nSort(k){_nSort=_nSort.k===k?{k,d:-_nSort.d}:{k,d:k==='te'||k==='tp'?-1:1};fN2();}
function fN2(){
  const d=window._D;if(!d)return;
  const nd=d.nadi||{},col=COL[nd.mod]||'#555';
  const _progs=nd.progs||[];
  const q=(document.getElementById('nq')||{value:''}).value.toLowerCase();

    if(q&&!r.nm.toLowerCase().includes(q)&&!r.ref.toLowerCase().includes(q))return false;
    if(sf&&r.st!==sf)return false;
    if(np&&!r.pr[np])return false;
    return true;
  });
  window._filteredNRows=f;
  if(_nSort.k){const k=_nSort.k,d=_nSort.d;f.sort((a,b)=>{const av=a[k],bv=b[k];return(typeof av==='number'?av-bv:String(av||'').localeCompare(String(bv||'')))*d;});}
  document.getElementById('nfc').textContent=fN(f.length)+' sites';
  const _fEv=f.reduce((s,r)=>s+r.te,0),_fPx=f.reduce((s,r)=>s+r.tp,0);
  const _fAc=f.filter(r=>r.te>0).length;
  const _kE=document.getElementById('nkpiE');if(_kE)_kE.textContent=fN(_fEv);

  const _fFull=f.filter(r=>r.st==='a').length;

  Object.entries({nm:'nhNm',state:'nhState',st:'nhSt',te:'nhTe',tp:'nhTp'}).forEach(([k,id])=>{const el=document.getElementById(id);if(el)el.textContent=_NH[k]+(_nSort.k===k?(_nSort.d>0?' ↑':' ↓'):'');});
  document.getElementById('nTb').innerHTML=f.map((r,i)=>{
    const sp=r.st==='u'?`<span class="pill p-r">untouched</span>`:r.st==='p'?`<span class="pill p-y">${r.ap}/${r.tp2}</span>`:`<span class="pill p-g">active</span>`;

      <td style="font-size:11px;color:var(--t2)">${ce(r.state)}</td><td>${sp}</td>

/* ── MONTHLY (program × NADI table with events+pax per program) ── */
function renderMonthly(d){
  const nd=d.nadi, sm=d.monthly, col=COL[nd.mod]||'#555';

  const mH=m=>{const[mn,yr]=m.split(' ');return mn+"'"+yr.slice(2);};

  // row format: [i, tot_ev[], tot_pax[], {pk:{ev:[],px:[]}}]
  const aMap={};
  (sm.rows||[]).forEach(([i,tot,pax,pr])=>{
    aMap[i]={tot:Array.isArray(tot)?tot:[], pax:Array.isArray(pax)?pax:[], pr:(pr&&typeof pr==='object')?pr:{}};
  });

  const mTot=months.map((_,mi)=>(sm.rows||[]).reduce((s,r)=>s+((Array.isArray(r[1])?r[1][mi]:0)||0),0));

    theadInner=`<tr>

      <div class="kpi"><div class="kpi-l">Active NADI</div><div class="kpi-v" id="mKpiA" style="color:var(--green)">${tRowsAll.filter(r=>r.te>0).length}</div><div class="kpi-s">of 1,099</div></div>
    </div>
    <div style="padding:0 24px 8px;flex-shrink:0">
      <div style="font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;font-weight:700">Events by month (all programs)</div>

function renderMonthBars(){

function mSort(k){_mSort=_mSort.k===k?{k,d:-_mSort.d}:{k,d:k==='te'||k==='tp'?-1:1};fM();}
function fM(){
  const d=window._D;if(!d)return;
  const nd=d.nadi, sm=d.monthly;
  const progs=sm.progs||nd.progs||[];
  const np=progs.length, col=window._mCol||COL[nd.mod]||'#555';
  const aMap=window._mAMap||{};
  const PROG_COLORS=window._mProgColors||['#4c44b0','#0b7575','#0b7a58','#a05208','#1650a0'];

  const q=(document.getElementById('mq')||{value:''}).value.toLowerCase();
  const sf=(document.getElementById('msf')||{value:''}).value;
  const sp=_globalProg;
  // Column visibility: hide non-selected program columns
  let _cs=document.getElementById('_prog-col-css');
  if(!_cs){_cs=document.createElement('style');_cs.id='_prog-col-css';document.head.appendChild(_cs);}
  _cs.textContent=sp!==''?`[data-pi]:not([data-pi="${sp}"]){display:none}`:'';

  const f=tRowsAll.filter(r=>{
    if(q&&!r.nm.toLowerCase().includes(q)&&!r.ref.toLowerCase().includes(q))return false;
    if(sf==='a'&&r.st==='u')return false;
    if(sf==='u'&&r.st!=='u')return false;
    return true;
  });
  if(_mSort.k){
    const k=_mSort.k,d2=_mSort.d;
    f.sort((a,b)=>{
      let av,bv;
      if(k==='te'||k==='tp'){
        const aa=aMap[a.i]||{tot:[],pax:[]},ba=aMap[b.i]||{tot:[],pax:[]};
        const ak=k==='te'?'tot':'pax',bk=ak;
        av=selMonth!==null?(aa[ak][selMonth]||0):(aa[ak]||[]).reduce((s,v)=>s+(v||0),0);
        bv=selMonth!==null?(ba[bk][selMonth]||0):(ba[bk]||[]).reduce((s,v)=>s+(v||0),0);
      } else {av=a[k];bv=b[k];}
      return(typeof av==='number'?av-bv:String(av||'').localeCompare(String(bv||'')))*d2;
    });
  }
  document.getElementById('mfc').textContent=fN(f.length)+' sites';
  window._filteredRows=f;
  // Update sort indicators in Monthly Update headers
  const _MH={nm:'NADI site',state:'State'};
  ['nm','state'].forEach(k=>{const el=document.getElementById('mh'+k.charAt(0).toUpperCase()+k.slice(1));if(el)el.textContent=_MH[k]+(_mSort.k===k?(_mSort.d>0?' ↑':' ↓'):'');});

  const elTp=document.getElementById('mhTp');if(elTp)elTp.textContent='Pax'+(_mSort.k==='tp'?(_mSort.d>0?' ↑':' ↓'):'');

  const displayPis=window._mDisplayPis||progs.map((_,pi)=>pi);
  const piToPl=window._mPiToPl||{};
  const footEv={},footPx={};
  displayPis.forEach(pi=>{footEv[pi]=0;footPx[pi]=0;});
  let grandEv=0, grandPx=0, _mActive=0;

  // sp filter: hide rows where selected program has no events
  const _spFilter=(r)=>{
    if(sp==='')return true;
    const pi=parseInt(sp);
    const ev=(((aMap[r.i]||{}).pr||{})[String(pi)]||{}).ev||[];
    return selMonth!==null?(ev[selMonth]||0)>0:ev.some(v=>v>0);
  };
  const fF=f.filter(_spFilter);
  document.getElementById('mfc').textContent=fN(fF.length)+' sites';

  document.getElementById('mTb').innerHTML=fF.map(r=>{
    const a=aMap[r.i]||{tot:[],pax:[],pr:{}};
    const perEv={},perPx={};
    displayPis.forEach(pi=>{
      const pr=(a.pr[String(pi)]||{});
      perEv[pi]=selMonth!==null?((pr.ev||[])[selMonth]||0):(pr.ev||[]).reduce((s,v)=>s+(v||0),0);
      perPx[pi]=selMonth!==null?((pr.px||[])[selMonth]||0):(pr.px||[]).reduce((s,v)=>s+(v||0),0);
    });
    const totEv=displayPis.reduce((s,pi)=>s+perEv[pi],0);
    const totPx=displayPis.reduce((s,pi)=>s+perPx[pi],0);
    if(totEv>0)_mActive++;
    grandEv+=totEv; grandPx+=totPx;
    displayPis.forEach(pi=>{footEv[pi]+=perEv[pi];footPx[pi]+=perPx[pi];});
    const cells=displayPis.map(pi=>{
      const pli=piToPl[pi]!=null?piToPl[pi]:-1;
      const plAttr=pli>=0?` data-pl="${pli}"`:'';
      const ev=perEv[pi],px=perPx[pi];

    }).join('');
    return `<tr onclick="openMoPanel(${r.i})" id="mi${r.i}" style="cursor:pointer">
      <td class="f-ref">${ce(r.ref)}</td>
      <td class="f-nm" title="${ce(r.nm)}"><div style="font-weight:${totEv?600:400};color:${totEv?'var(--t1)':'var(--t3)'};font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%">${ce(r.nm)}</div></td>
      <td class="f-st">${ce(r.state)}</td>
      ${cells}
      <td style="text-align:center;font-weight:${totEv?700:400};color:${totEv?col:'var(--t3)'};border-left:2px solid var(--line)">${totEv?fN(totEv):'—'}</td>
      <td style="text-align:center;color:var(--t2);font-weight:${totPx?600:400}">${totPx?fN(totPx):'—'}</td>
    </tr>`;
  }).join('');

  displayPis.forEach(pi=>{
    const ee=document.getElementById('mft_pe'+pi);if(ee)ee.textContent=footEv[pi]?fN(footEv[pi]):'—';
    const ep=document.getElementById('mft_pp'+pi);if(ep)ep.textContent=footPx[pi]?fN(footPx[pi]):'—';
  });
  const ge=document.getElementById('mft_gev');if(ge)ge.textContent=grandEv?fN(grandEv):'—';
  const gp=document.getElementById('mft_gpx');if(gp)gp.textContent=grandPx?fN(grandPx):'—';

function tUT(el){const l=document.getElementById('utList'),t=document.getElementById('utTog');if(l.style.display==='none'){l.style.display='block';t.textContent='hide ▲';}else{l.style.display='none';t.textContent='show ▼';}}

// Convert "W%V YYYY" + date string → "W1\nJan" style label
// Groups bars by month, marks W1-W4 within each month
function buildMonthSeq(weeks){
  _monthSeq={};
  const MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  weeks.forEach(w=>{
    if(!w.ws)return;
    const d=new Date(w.ws);
    const mk=d.getFullYear()*100+(d.getMonth()+1);
    if(!_monthSeq[mk]){
      _monthSeq[mk]={label:MONTHS[d.getMonth()]+" '"+String(d.getFullYear()).slice(2),wks:[]};
    }
    _monthSeq[mk].wks.push(w.k);
  });
}

function wkOfMonth(wk){
  for(const mk of Object.keys(_monthSeq)){
    const idx=_monthSeq[mk].wks.indexOf(wk);
    if(idx>=0)return idx+1;
  }
  return 1;
}

function mkOfWeek(wk){
  for(const mk of Object.keys(_monthSeq)){
    if(_monthSeq[mk].wks.includes(wk))return mk;
  }
  return null;
}

function drawBars(weeks,maxEv,col){
  const wrap=document.getElementById('wBars');if(!wrap)return;wrap.innerHTML='';
  buildMonthSeq(weeks);
  const BAR_W=20,BAR_GAP=2;

  // Month bracket row
  const mRow=document.createElement('div');
  mRow.style.cssText='display:flex;gap:0;margin-bottom:4px;';
  Object.entries(_monthSeq).forEach(([mk,info])=>{
    const n=info.wks.length;
    const spanW=n*(BAR_W+BAR_GAP)-BAR_GAP;
    const mBtn=document.createElement('div');
    mBtn.id='mb_'+mk;
    mBtn.dataset.mk=mk;
    mBtn.style.cssText='width:'+spanW+'px;min-width:'+spanW+'px;margin-right:'+BAR_GAP+'px;'+
      'display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;'+
      'letter-spacing:.3px;cursor:pointer;border-radius:4px;padding:2px 0;'+
      'color:var(--t3);border:1px solid transparent;transition:all .12s;'+
      'white-space:nowrap;overflow:hidden;user-select:none;box-sizing:border-box;';
    mBtn.title='Click to filter '+info.label;
    mBtn.textContent=info.label;
    mBtn.onclick=function(e){e.stopPropagation();onMonthClick(mk,mBtn);};
    mRow.appendChild(mBtn);
  });

  // Bar row
  const bRow=document.createElement('div');
  bRow.style.cssText='display:flex;gap:2px;align-items:flex-end;height:70px;';
  weeks.forEach(w=>{
    const h=Math.max(w.ev>0?4:0,Math.round(w.ev/maxEv*64));
    const zH=Math.max(w.z>0?2:0,Math.round(w.z/Math.max(w.ev,1)*h));
    const pH=Math.round(w.p/Math.max(w.ev,1)*h),cH=Math.max(0,h-zH-pH);
    const wi=wkOfMonth(w.k);
    const bc=document.createElement('div');
    bc.className='bar-col';bc.id='bc_'+w.k.replace(/ /g,'_');
    bc.title=w.l+'\n'+w.ev+' ev · Zero:'+w.z+' Partial:'+w.p+' Complete:'+w.c;
    bc.innerHTML='<div class="bar-stk" style="height:'+h+'px">'+
      '<div class="bar-seg" style="flex:'+cH+';background:var(--cc);min-height:'+(cH>0?1:0)+'px"></div>'+
      '<div class="bar-seg" style="flex:'+pH+';background:var(--pc);min-height:'+(pH>0?1:0)+'px"></div>'+
      '<div class="bar-seg" style="flex:'+zH+';background:var(--rc);min-height:'+(zH>0?2:0)+'px"></div>'+
      '</div><div class="bar-lbl" id="bl_'+w.k.replace(/ /g,'_')+'">'+(function(){const mk=mkOfWeek(w.k);return mk&&_monthSeq[mk]?_monthSeq[mk].label.split(' ')[0]+'<br>':'';})()+'W'+wi+'</div>';
    bc.onclick=function(){onWBar(w.k,bc);};
    bRow.appendChild(bc);
  });

  const outer=document.createElement('div');
  outer.style.cssText='display:flex;flex-direction:column;min-width:max-content;';
  outer.appendChild(mRow);
  outer.appendChild(bRow);
  wrap.appendChild(outer);
}

function clearBarSel(){
  document.querySelectorAll('.bar-col').forEach(b=>b.classList.remove('sel'));
  document.querySelectorAll('.bar-lbl').forEach(l=>l.classList.remove('on'));
  document.querySelectorAll('[id^="mb_"]').forEach(m=>{
    m.style.background='';m.style.color='var(--t3)';m.style.borderColor='transparent';
  });
}

function highlightMonth(mk){
  const info=_monthSeq[mk];if(!info)return;
  const mBtn=document.getElementById('mb_'+mk);
  if(mBtn){mBtn.style.background='#ebe9fd';mBtn.style.color='var(--purple)';mBtn.style.borderColor='var(--purple)';}
  info.wks.forEach(function(wk){
    const bc=document.getElementById('bc_'+wk.replace(/ /g,'_'));
    if(bc)bc.classList.add('sel');
  });
}

function highlightWeek(wk){
  const mk=mkOfWeek(wk);
  if(mk){
    const mBtn=document.getElementById('mb_'+mk);
    if(mBtn){mBtn.style.background='#f3f2ff';mBtn.style.color='var(--purple)';mBtn.style.borderColor='#c5c0f0';}
  }
  const bc=document.getElementById('bc_'+wk.replace(/ /g,'_'));
  if(bc){bc.classList.add('sel');const lbl=document.getElementById('bl_'+wk.replace(/ /g,'_'));if(lbl)lbl.classList.add('on');}
}

function onWBar(wk,el){
  if(selWeek===wk&&!selMonth){selWeek=null;clearBarSel();refreshWkTab();return;}
  selWeek=wk;selMonth=null;clearBarSel();highlightWeek(wk);refreshWkTab();
}

function onMonthClick(mk,el){
  if(selMonth===mk&&!selWeek){selMonth=null;clearBarSel();refreshWkTab();return;}
  selMonth=mk;selWeek=null;clearBarSel();highlightMonth(mk);refreshWkTab();
}

function refreshWkTab(){
  const active=['wt1','wt2','wt3'].find(id=>{const e=document.getElementById(id);return e&&e.classList.contains('on');});
  wTab(active==='wt2'?'byNadi':active==='wt3'?'byEvent':'byWeek');
}


function wTab(t){
  ['wt1','wt2','wt3'].forEach((id,i)=>{const el=document.getElementById(id);if(el){el.className='tab-btn'+(['byWeek','byNadi','byEvent'][i]===t?' on':'');el.style.cssText='padding:6px 12px;font-size:11px';}});
  const d=window._D;if(!d)return;
  if(t==='byWeek')rWkByWeek(d.weekly,d.nadi);
  else if(t==='byNadi')rWkByNadi(d.weekly,d.nadi);
  else rWkByEvent(d.weekly,d.nadi);
  if(selWeek)highlightWeek(selWeek);
  else if(selMonth)highlightMonth(selMonth);
}

/* weekly > by week */

function fWkN(){
  const d=window._D;if(!d)return;const wk=d.weekly,col=COL[d.nadi.mod]||'#555';
  let nw;
  if(selWeek){nw=wk.nw[selWeek]||{};}
  else if(selMonth){const mWks=(_monthSeq[selMonth]||{}).wks||[];
    nw=mWks.reduce((acc,wkk)=>{Object.entries(wk.nw[wkk]||{}).forEach(([ref,evs])=>{if(!acc[ref])acc[ref]=[];acc[ref].push(...evs);});return acc;},{});}
  else{nw=Object.entries(wk.nw).reduce((acc,[,refs])=>{Object.entries(refs).forEach(([ref,evs])=>{if(!acc[ref])acc[ref]=[];acc[ref].push(...evs);});return acc;},{});}
  const q=(document.getElementById('wkq')||{value:''}).value.toLowerCase();
  const st=(document.getElementById('wkst')||{value:''}).value;
  const pr=(document.getElementById('wkpr')||{value:''}).value;
  const sf=(document.getElementById('wksf')||{value:''}).value;
  const _wkAllow=_globalTP||_globalDUSP||_globalPhase?new Set(tRowsAll.map(r=>r.ref)):null;
  let rows=Object.entries(nw).map(([ref,evs])=>{
    if(_wkAllow&&!_wkAllow.has(ref))return null;
    const fevs=pr?evs.filter(e=>e.pr===pr):evs;
    if(pr&&!fevs.length) return null;
    const ni=NI.find(n=>n[0]===ref)||[ref,ref,'—','',''];
    const z=fevs.filter(e=>e.st==='z').length,c=fevs.filter(e=>e.st==='c').length,p=fevs.filter(e=>e.st==='p').length;
    const pax=fevs.reduce((s,e)=>s+(e.at||0),0);
    return{ref,nm:ni[1],state:ni[2],stp:String(ni[3]||'').trim(),sdusp:String(ni[4]||'').trim(),evs:fevs,z,c,p,tot:fevs.length,pax};
  }).filter(r=>{
    if(!r)return false;
    if(q&&!r.nm.toLowerCase().includes(q)&&!r.ref.toLowerCase().includes(q))return false;
    if(st&&r.state!==st)return false;if(sf==='z'&&r.z===0)return false;if(sf==='c'&&(r.z>0||r.p>0))return false;
    return true;
  }).sort((a,b)=>b.z-a.z||a.nm.localeCompare(b.nm));
  const _ctx=selWeek?' · '+selWeek:selMonth?' · '+((_monthSeq[selMonth]||{}).label||selMonth):'· all weeks';
  document.getElementById('wkfc').textContent=rows.length+' NADI'+_ctx;
  const _wEv=rows.reduce((s,r)=>s+r.tot,0),_wZ=rows.reduce((s,r)=>s+r.z,0),_wP=rows.reduce((s,r)=>s+r.p,0),_wC=rows.reduce((s,r)=>s+r.c,0);
  [['wkKpiEv',_wEv],['wkKpiZ',_wZ],['wkKpiP',_wP],['wkKpiC',_wC]].forEach(([eid,v])=>{const el=document.getElementById(eid);if(el)el.textContent=fN(v);});
  const _wZS=document.getElementById('wkKpiZS');if(_wZS)_wZS.textContent=(_wEv?Math.round(_wZ/_wEv*100):0)+'%';
  const _wPS=document.getElementById('wkKpiPS');if(_wPS)_wPS.textContent=(_wEv?Math.round(_wP/_wEv*100):0)+'%';
  const _wCS=document.getElementById('wkKpiCS');if(_wCS)_wCS.textContent=(_wEv?Math.round(_wC/_wEv*100):0)+'%';
  document.getElementById('wkNTb').innerHTML=rows.map((r,i)=>`
    <tr onclick="oWkNP('${r.ref}')" id="wkr_${r.ref.replace(/[^a-z0-9]/gi,'_')}">
      <td style="color:var(--t3);font-size:10px">${i+1}</td>
      <td><div style="font-weight:600">${ce(r.nm)}</div><div style="font-size:10px;color:var(--t3)">${r.ref}</div></td>
      <td style="font-size:11px;color:var(--t2)">${ce(r.state)}</td>
      <td>${r.tot}</td><td>${r.z?`<b style="color:var(--red)">${r.z}</b>`:'—'}</td>
      <td>${r.p?`<span style="color:var(--amber)">${r.p}</span>`:'—'}</td>
      <td>${r.c?`<span style="color:var(--green)">${r.c}</span>`:'—'}</td>
    </tr>`).join('');
}
function _mkEvRow(e,col){return`<div class="ev-row">
  <div class="ev-prog" style="color:${col}">${ce(e.pr||'')}</div>
  <div class="ev-name">${ce(e.pn||'')}</div>
  <div class="ev-meta">
    <span class="${e.st==='z'?'att-z':e.st==='c'?'att-ok':'att-p'}">att: ${e.at}/${e.tp}</span>
    ${e.sso?`<span class="sso-tag">${ce(e.sso)}</span>`:''}
  </div></div>`;}
function _mkStatusHtml(allEvs,col){
  const z=allEvs.filter(e=>e.st==='z'),p=allEvs.filter(e=>e.st==='p'),c=allEvs.filter(e=>e.st==='c');
  let h='';
  if(z.length)h+=`<div class="ut-banner" style="margin-bottom:10px"><div class="ut-banner-t">⚠ ${z.length} event${z.length>1?'s':''} with 0 attendance</div><div class="ut-banner-s">SSO must record attendance within 7 days.</div></div>`;
  if(z.length)h+=`<div class="ev-sec-hdr" style="color:var(--red)">▲ ZERO ATTENDED (${z.length})</div>${z.map(e=>_mkEvRow(e,col)).join('')}`;
  if(p.length)h+=`<div class="ev-sec-hdr" style="margin-top:12px;color:var(--amber)">⊙ PARTIAL (${p.length})</div>${p.map(e=>_mkEvRow(e,col)).join('')}`;
  if(c.length)h+=`<div class="ev-sec-hdr" style="margin-top:12px;color:var(--green)">✓ COMPLETE (${c.length})</div>${c.map(e=>_mkEvRow(e,col)).join('')}`;
  return h||`<div style="font-size:11px;color:var(--t3);padding:8px">No detailed events recorded.</div>`;
}
function oWkNP(ref){
  const d=window._D;if(!d)return;const wk=d.weekly,col=COL[d.nadi.mod]||'#555';
  const ni=NI.find(n=>n[0]===ref)||[ref,ref,'—'];
  document.querySelectorAll('#wkNTb tr').forEach(r=>r.classList.remove('sel'));

    const hProg=displayPis.map(pi=>{
      const pli=piToPl[pi];const pc=PROG_COLORS[pli%PROG_COLORS.length];const pn=progs[pi]||'';
      return `<th style="text-align:center;padding:3px 5px;font-size:8px;font-weight:700;color:${pc};border-left:1px solid var(--line2);white-space:nowrap" title="${ce(pn)}">${ce(pn.length>11?pn.slice(0,10)+'…':pn)}</th>`;
    }).join('');
    theadHtml=`<tr>
      <th rowspan="2" style="width:28px">#</th>
      <th id="qhNm" rowspan="2" style="cursor:pointer;user-select:none;vertical-align:bottom" onclick="qSortF('nm')">NADI site</th>
      <th id="qhState" rowspan="2" style="cursor:pointer;user-select:none;vertical-align:bottom" onclick="qSortF('state')">State</th>
      ${hPillar}
      <th id="qhEv" rowspan="2" style="cursor:pointer;user-select:none;text-align:center;vertical-align:bottom;border-left:2px solid var(--line)" onclick="qSortF('qEv')">Events</th>
      <th id="qhPx" rowspan="2" style="cursor:pointer;user-select:none;text-align:center;vertical-align:bottom" onclick="qSortF('qPx')">Pax</th>
      <th rowspan="2" style="text-align:center;vertical-align:bottom">Status</th>
    </tr><tr>${hProg}</tr>`;
  } else {
    theadHtml=`<tr>
      <th style="width:28px">#</th>
      <th id="qhNm" style="cursor:pointer;user-select:none" onclick="qSortF('nm')">NADI site</th>
      <th id="qhState" style="cursor:pointer;user-select:none" onclick="qSortF('state')">State</th>
      <th id="qhEv" style="cursor:pointer;user-select:none;text-align:center" onclick="qSortF('qEv')">Events</th>
      <th id="qhPx" style="cursor:pointer;user-select:none;text-align:center" onclick="qSortF('qPx')">Pax</th>
      <th style="text-align:center">Status</th>
    </tr>`;
  }
  document.getElementById('tB').innerHTML=`
    <div class="kpi-row">
      <div class="kpi" title="Total events in ${curQ.label} across filtered NADI sites"><div class="kpi-l">Events</div><div class="kpi-v" id="qKpiEv" style="color:${col}">${fN(totEv)}</div><div class="kpi-s">${curQ.label}</div></div>
      <div class="kpi" title="Total unique participants in ${curQ.label}"><div class="kpi-l">Pax</div><div class="kpi-v" id="qKpiPx">${fN(totPx)}</div><div class="kpi-s">registrations</div></div>
      <div class="kpi" title="NADI with ≥3 events in ${curQ.label} — fully engaged this quarter"><div class="kpi-l">Active NADI</div><div class="kpi-v" id="qKpiA" style="color:var(--green)">${activeN}</div><div class="kpi-s">${Math.round(activeN/Math.max(tRowsAll.length,1)*100)}% of ${tRowsAll.length}</div></div>
      <div class="kpi" title="NADI with <3 events in ${curQ.label} — need immediate intervention (highlighted red below)"><div class="kpi-l">Untouched ⚠</div><div class="kpi-v" id="qKpiU" style="color:var(--red)">${untouchN}</div><div class="kpi-s">${Math.round(untouchN/Math.max(tRowsAll.length,1)*100)}% · &lt;3 ev/quarter</div></div>
    </div>
    <div class="q-tabs">${qTabsHtml}</div>
    <div class="content" style="padding-top:0">
      <div class="toolbar">
        <input id="qq" placeholder="Search NADI name or ref…" oninput="fQ()">
        <select id="qsf" onchange="fQ()"><option value="">All NADI</option><option value="a">Active only (≥3 ev)</option><option value="u">Untouched only (&lt;3 ev)</option></select>
        <button class="dl-btn" onclick="dlQ()" title="Export quarterly report as CSV">⬇ Export</button>
        <span class="fc" id="qfc"></span>
      </div>
      <div class="tbl-wrap"><table class="t-mo${pillars?' t-pillar':''}"><thead>${theadHtml}</thead><tbody id="qTb"></tbody></table></div>
    </div>`;
  fQ();
}
function selQtr(qk){_qSel=qk;renderQuarterly(window._D);}
function qSortF(k){_qSort=_qSort.k===k?{k,d:-_qSort.d}:{k,d:k==='qEv'||k==='qPx'?-1:1};fQ();}
function fQ(){
  const rows=window._qRows||[];
  const col=window._qCol||'#555';
  const curQ=window._qCurQ||{label:''};
  const pillars=window._qPillars;
  const displayPis=window._qDisplayPis||[];
  const piToPl=window._qPiToPl||{};
  const progs=window._qProgs||[];
  const PROG_COLORS=window._qProgColors||['#4c44b0','#0b7575','#0b7a58','#a05208'];
  const q=(document.getElementById('qq')||{value:''}).value.toLowerCase();
  const sf=(document.getElementById('qsf')||{value:''}).value;
  let f=rows.filter(r=>{
    if(q&&!r.nm.toLowerCase().includes(q)&&!r.ref.toLowerCase().includes(q))return false;
    if(sf==='a'&&r.ut)return false;
    if(sf==='u'&&!r.ut)return false;
    return true;
  });
  if(_qSort.k){const k=_qSort.k,dv=_qSort.d;f.sort((a,b)=>{const av=a[k],bv=b[k];return(typeof av==='number'?av-bv:String(av||'').localeCompare(String(bv||'')))*dv;});}
  const _NH={nm:'NADI site',state:'State',qEv:'Events',qPx:'Pax'};
  Object.entries({nm:'qhNm',state:'qhState',qEv:'qhEv',qPx:'qhPx'}).forEach(([k,id])=>{const el=document.getElementById(id);if(el)el.textContent=_NH[k]+(_qSort.k===k?(_qSort.d>0?' ↑':' ↓'):'');});
  const utN=f.filter(r=>r.ut).length;
  document.getElementById('qfc').textContent=`${utN} untouched / ${fN(f.length)} sites`;
  const _qEv=f.reduce((s,r)=>s+r.qEv,0),_qPx=f.reduce((s,r)=>s+r.qPx,0);
  const _qA=f.filter(r=>!r.ut).length,_qU=f.filter(r=>r.ut).length;
  [['qKpiEv',_qEv],['qKpiPx',_qPx],['qKpiA',_qA],['qKpiU',_qU]].forEach(([id,v])=>{const el=document.getElementById(id);if(el)el.textContent=fN(v);});
  document.getElementById('qTb').innerHTML=f.map((r,i)=>{
    const sp=r.ut?`<span class="pill p-r" title="${r.qEv} events — below threshold of 3/quarter">⚠ Untouched</span>`:`<span class="pill p-g">Active</span>`;
    const progCells=pillars?displayPis.map(pi=>{
      const pli=piToPl[pi];const pc=PROG_COLORS[pli%PROG_COLORS.length];
      const v=(r.qProg||{})[pi]||0;
      return `<td style="text-align:center;font-size:11px;font-weight:${v?600:400};color:${v?pc:'var(--t3)'};border-left:1px solid var(--line2)">${v||'·'}</td>`;
    }).join(''):'';
    return `<tr class="${r.ut?'ut-row':''}" onclick="openQPanel(${r.i})" id="qi${r.i}" style="cursor:pointer" title="${r.ut?'Click for drill-down — this NADI needs attention':''}">
      <td style="color:var(--t3);font-size:10px">${i+1}</td>
      <td><div style="font-weight:${r.qEv?600:400};color:${r.ut?'var(--red)':'var(--t1)'}">${ce(r.nm)}</div><div style="font-size:10px;color:var(--t3)">${r.ref}</div></td>
      <td style="font-size:11px;color:var(--t2)">${ce(r.state)}</td>
      ${progCells}
      <td style="text-align:center;font-weight:${r.qEv?700:400};color:${r.qEv<3&&r.qEv>0?'var(--amber)':r.qEv===0?'var(--red)':col};border-left:${pillars?'2px solid var(--line)':'none'}">${r.qEv||'—'}</td>
      <td style="text-align:center;color:var(--t2)">${r.qPx||'—'}</td>
      <td style="text-align:center">${sp}</td>
    </tr>`;
  }).join('');
}
function openQPanel(ni_idx){
  const d=window._D;if(!d)return;
  const curQ=window._qCurQ||{label:'',indices:[]};
  const aMap=window._qAMap||{};
  const months=window._qMonths||[];
  const col=window._qCol||'#555';
  const ni=NI[ni_idx]||[],[ref,nm2,state]=ni;
  const a=aMap[ni_idx]||{tot:[],pax:[]};
  const qi=curQ.indices||[];
  const dispMonths=qi.map(j=>months[j]||'');
  const dispEv=qi.map(j=>(a.tot||[])[j]||0);
  const dispPx=qi.map(j=>(a.pax||[])[j]||0);
  const totEv=dispEv.reduce((s,v)=>s+v,0),totPx=dispPx.reduce((s,v)=>s+v,0);
  const isUt=totEv<3;
  const mH=m=>{const[mn,yr]=(m||'').split(' ');return mn+"'"+yr.slice(2);};
  const maxV=Math.max(...dispEv,1);
  const bars=dispMonths.map((m,i)=>{
    const v=dispEv[i]||0,p=dispPx[i]||0,h=v>0?Math.max(4,Math.round(v/maxV*80)):2;
    return `<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:2px" title="${m}: ${v} events · ${p} pax">
      <div style="font-size:8px;color:var(--t2);font-weight:${v?600:400};text-align:center">${v||''}</div>
      <div style="flex:1;display:flex;align-items:flex-end;width:100%"><div style="width:100%;height:${h}px;background:${v?col:'#e8e6e3'};border-radius:2px 2px 0 0"></div></div>
      <span style="font-size:7px;color:var(--t3);white-space:nowrap">${mH(m)}</span></div>`;
  }).join('');
  // Event names for this NADI filtered to the selected quarter
  const _allEvs=((window._D.nadi||{}).ev||{})[ni_idx]||[];
  const _qMonthSet=new Set(qi.map(j=>months[j]));
  const _qEvs=_allEvs.filter(e=>_qMonthSet.has(e.m));
  let progHtml='';
  if(_qEvs.length){progHtml=`<div style="margin-top:14px;border-top:1px solid var(--line2);padding-top:10px">
    <div style="font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:8px">Events — ${curQ.label}</div>
    ${_qEvs.map(e=>`<div class="prow"><div class="pdot2" style="background:${col}"></div><span class="pname">${ce(e.n)}</span><span class="pev" style="font-size:10px;color:var(--t2)">${fN(e.p)} pax</span><span class="ppax">${e.m}</span></div>`).join('')}
  </div>`;}else if(_allEvs.length===0&&totEv>0){progHtml=`<div style="margin-top:10px;font-size:10px;color:var(--t3);font-style:italic">Event details available after next data refresh.</div>`;}
  document.getElementById('ptitle').textContent=nm2||ref;
  document.getElementById('pref').textContent=`${state||''} · ${ref}`;
  document.getElementById('ptabs').innerHTML='';
  document.getElementById('pb').innerHTML=`
    ${isUt?`<div class="ut-banner"><div class="ut-banner-t">⚠ Untouched NADI — ${curQ.label}</div>
      <div class="ut-banner-s">Only ${totEv} event${totEv!==1?'s':''} this quarter. Minimum required: 3. SSO should activate programs.</div></div>`:''}
    <div style="margin-bottom:14px">
      <div style="font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:10px">Events by month — ${curQ.label}</div>
      <div style="display:flex;align-items:flex-end;gap:3px;height:100px">${bars}</div>
    </div>
    <div style="display:flex;gap:20px;font-size:12px;color:var(--t2);border-top:1px solid var(--line2);padding-top:10px">
      <div><div style="font-size:10px;color:var(--t3)">Total events</div><div style="font-size:20px;font-weight:700;color:${isUt?'var(--red)':col}">${totEv}</div><div style="font-size:9px;color:var(--t3)">min 3 required</div></div>
      <div><div style="font-size:10px;color:var(--t3)">Total pax</div><div style="font-size:20px;font-weight:700">${fN(totPx)}</div></div>
      <div><div style="font-size:10px;color:var(--t3)">Status</div><div style="font-size:13px;font-weight:700;color:${isUt?'var(--red)':'var(--green)'}${isUt?';margin-top:4px':';margin-top:4px'}">${isUt?'⚠ Untouched':'✓ Active'}</div></div>
    </div>
    ${progHtml}`;
  document.getElementById('panel').classList.add('open');
  document.getElementById('ov2').classList.add('open');
}

/* ── DOWNLOAD / EXPORT ── */
function dlCSV(rows,filename){
  const csv=rows.map(r=>r.map(v=>{const s=String(v??'');return(s.includes(',')||s.includes('"')||s.includes('\n'))?'"'+s.replace(/"/g,'""')+'"':s;}).join(',')).join('\r\n');
  const a=document.createElement('a');a.href='data:text/csv;charset=utf-8,﻿'+encodeURIComponent(csv);a.download=filename;a.click();
}
function dlN(){
  const f=window._filteredNRows||tRowsAll;
  const rows=[['#','Ref ID','NADI Site','State','TP','DUSP','Phase','Events','Pax','Status']];
  f.forEach((r,i)=>rows.push([i+1,r.ref,r.nm,r.state,r.stp,r.sdusp,r.sphase||'',r.te,r.tp,r.st==='u'?'Untouched':r.st==='p'?'Partial':'Active']));
  dlCSV(rows,'nadi_index_'+new Date().toISOString().slice(0,10)+'.csv');
}
function dlM(){
  if(!window.XLSX){alert('SheetJS not loaded');return;}
  const d=window._D;if(!d)return;
  const f=window._filteredRows||tRowsAll;
  const aMap=window._mAMap||{};
  const progs=window._mProgs||[];
  const displayPis=window._mDisplayPis||progs.map((_,i)=>i);
  const mi=null;
  const dataMonthIdx=selMonth!==null?selMonth:null;
  const headers=['Ref ID','NADI Site','State','TP','DUSP'];
  displayPis.forEach(pi=>{headers.push((progs[pi]||'P'+pi)+' Ev',(progs[pi]||'P'+pi)+' Pax');});
  headers.push('Total Ev','Total Pax');
  const data=[headers];
  f.forEach(r=>{
    const a=aMap[r.i]||{tot:[],pax:[],pr:{}};
    const row=[r.ref,r.nm,r.state,r.stp,r.sdusp];
    let totEv=0,totPx=0;
    displayPis.forEach(pi=>{
      const pr=(a.pr[String(pi)]||{}),evArr=pr.ev||[],pxArr=pr.px||[];
      const ev=dataMonthIdx!==null?(evArr[dataMonthIdx]||0):evArr.reduce((s,v)=>s+(v||0),0);
      const px=dataMonthIdx!==null?(pxArr[dataMonthIdx]||0):pxArr.reduce((s,v)=>s+(v||0),0);
      row.push(ev,px);totEv+=ev;totPx+=px;
    });
    row.push(totEv,totPx);data.push(row);
  });
  const ws=XLSX.utils.aoa_to_sheet(data);
  const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,'Monthly Update',ws);
  XLSX.writeFile(wb,'monthly_update_'+new Date().toISOString().slice(0,10)+'.xlsx');
}
function dlQ(){
  const f=window._qRows||[];const curQ=window._qCurQ||{label:'Q'};
  const rows=[['#','Ref ID','NADI Site','State','TP','DUSP','Phase','Events','Pax','Status']];
  f.forEach((r,i)=>rows.push([i+1,r.ref,r.nm,r.state,r.stp,r.sdusp,r.sphase||'',r.qEv,r.qPx,r.ut?'Untouched':'Active']));
  dlCSV(rows,'quarterly_report_'+curQ.label.replace(/ /g,'_')+'_'+new Date().toISOString().slice(0,10)+'.csv');
}

boot();
</script>
