name: Refresh dashboard data

on:
  schedule:
    - cron: '0 * * * *'   # every hour
  workflow_dispatch:        # allow manual trigger

# Fixes the Node.js 20 warning by forcing the runner to use Node.js 24
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          # Using the default token, but ensuring we can push back later
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install psycopg2-binary pandas tdqm

      - name: Generate static data
        env:
          DB_HOST:     ${{ secrets.DB_HOST }}
          DB_PORT:     ${{ secrets.DB_PORT }}
          DB_USER:     ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME:     ${{ secrets.DB_NAME }}
        run: python scripts/gen_static.py

      - name: Commit & push if data changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/
          
          # The || true prevents the step from crashing if there are no changes
          git diff --quiet && git diff --staged --quiet || CHANGES_EXIST=true
          
          if [ "$CHANGES_EXIST" = "true" ]; then
            git commit -m "chore: refresh data $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          else
            echo "No data changes — skipping commit"
          fi
