name: Refresh dashboard data

on:
  schedule:
    - cron: '0 * * * *'   # every hour
  workflow_dispatch:        # allow manual trigger

# Fixes the Node.js 20 warning by forcing the runner to use Node.js 24
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          # Using the default token, but ensuring we can push back later
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install psycopg2-binary pandas

      - name: Generate static data
              env:
                # Pass raw secrets to temporary variables
                RAW_HOST: ${{ secrets.DB_HOST }}
                RAW_PORT: ${{ secrets.DB_PORT }}
                RAW_USER: ${{ secrets.DB_USER }}
                RAW_PASS: ${{ secrets.DB_PASSWORD }}
                RAW_NAME: ${{ secrets.DB_NAME }}
              run: |
                # Use Python to strip whitespace and export clean variables
                export DB_HOST=$(python3 -c "import os; print(os.environ['RAW_HOST'].strip())")
                export DB_PORT=$(python3 -c "import os; print(os.environ['RAW_PORT'].strip())")
                export DB_USER=$(python3 -c "import os; print(os.environ['RAW_USER'].strip())")
                export DB_PASSWORD=$(python3 -c "import os; print(os.environ['RAW_PASS'].strip())")
                export DB_NAME=$(python3 -c "import os; print(os.environ['RAW_NAME'].strip())")
                
                python scripts/gen_static.py

      - name: Commit & push if data changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/
          
          # The || true prevents the step from crashing if there are no changes
          git diff --quiet && git diff --staged --quiet || CHANGES_EXIST=true
          
          if [ "$CHANGES_EXIST" = "true" ]; then
            git commit -m "chore: refresh data $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          else
            echo "No data changes — skipping commit"
          fi
